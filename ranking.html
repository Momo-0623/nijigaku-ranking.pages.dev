<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>虹学夏季野球大会｜ランキング</title>
<style>
:root{--navy:#05284d;--line:#d9dee6;--bg:#f4f6f8}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;color:#15202b}header{background:var(--navy);color:white;padding:18px;display:flex;align-items:center;gap:10px}header img{width:38px;height:38px;object-fit:contain}main{max-width:900px;margin:auto;padding:16px}.card{background:white;border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px}table{width:100%;border-collapse:collapse}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left}.team{display:flex;align-items:center;gap:10px}.team img{width:42px;height:42px;object-fit:contain}.note{font-size:13px;color:#65717d}
</style></head><body><header><img src="assets/baseball.png"><h2>虹学夏季野球大会</h2></header><main>
<div class="card"><b>公開ランキング</b><p class="note">この雛形は現在ローカル保存版です。Firebase接続後、運営画面の更新を自動反映できます。</p></div>
<div class="card"><h2>チームランキング</h2><table><thead><tr><th>順位</th><th>チーム</th><th>得点</th></tr></thead><tbody id="teams"></tbody></table></div>
<div class="card"><h2>個人ランキング</h2><table><thead><tr><th>順位</th><th>名前</th><th>所属</th><th>得点</th></tr></thead><tbody id="players"></tbody></table></div>
</main><script>
const KEY='nijigakuBaseballV1',ph='assets/team-placeholder.png';let db=JSON.parse(localStorage.getItem(KEY)||'{"teams":[],"students":[]}');const team=id=>db.teams.find(t=>t.id===id);const esc=s=>(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
teams.innerHTML=[...db.teams].sort((a,b)=>b.score-a.score).map((t,i)=>`<tr><td>${i+1}</td><td><span class="team"><img src="${t.logo||ph}">${esc(t.name)}</span></td><td>${t.score}pt</td></tr>`).join('');
players.innerHTML=[...db.students].sort((a,b)=>b.score-a.score).map((s,i)=>`<tr><td>${i+1}</td><td>${esc(s.name)}</td><td>${esc(team(s.teamId)?.name||'未所属')}</td><td>${s.score||0}pt</td></tr>`).join('');
</script></body></html>
